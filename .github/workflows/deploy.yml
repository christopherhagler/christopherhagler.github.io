name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: SPA fallback + disable Jekyll
        run: |
          # Real routes (home + each post) are prerendered to their own HTML.
          # index.csr.html is the un-prerendered shell; use it for unknown URLs
          # so the SPA boots and the wildcard route redirects home.
          cp dist/portfolio/browser/index.csr.html dist/portfolio/browser/404.html
          touch dist/portfolio/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/portfolio/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
