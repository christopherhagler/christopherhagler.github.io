<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="15%" cy="0%" r="55%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="92%" cy="12%" r="55%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="55%" cy="105%" r="55%">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#07070b"/>
  <rect width="1200" height="630" fill="url(#glowCyan)"/>
  <rect width="1200" height="630" fill="url(#glowViolet)"/>
  <rect width="1200" height="630" fill="url(#glowPink)"/>
  <rect x="6" y="6" width="1188" height="618" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Logo chip -->
  <g transform="translate(80, 80)">
    <rect width="84" height="84" rx="20" fill="url(#chip)"/>
    <text x="42" y="58" text-anchor="middle" fill="#07070b"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="42" font-weight="700" letter-spacing="-1">CH</text>
  </g>
  <text x="184" y="135" fill="#9aa0b4"
        font-family="'DejaVu Sans Mono', monospace" font-size="22" letter-spacing="2">
    christopherhagler.com
  </text>

  <!-- Name -->
  <text x="80" y="330" fill="#eef0f6"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="96" font-weight="700" letter-spacing="-3">Christopher Hagler</text>

  <!-- Role -->
  <text x="80" y="408" fill="url(#accent)"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="46" font-weight="600" letter-spacing="-1">
    Radar Electronic Warfare Software Engineer
  </text>

  <!-- Tagline -->
  <text x="80" y="470" fill="#9aa0b4"
        font-family="'DejaVu Sans Mono', monospace" font-size="26" letter-spacing="3">
    software · signals · systems
  </text>

  <!-- Accent bar -->
  <rect x="80" y="520" width="320" height="6" rx="3" fill="url(#accent)"/>
</svg>
