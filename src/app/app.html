<app-background />

<!-- ===================== NAV ===================== -->
<header class="nav" [class.nav--scrolled]="scrolled()">
  <a class="nav__brand" routerLink="/" (click)="closeMenu()">
    <span class="nav__logo">CH</span>
    <span class="nav__brandtext">Christopher Hagler</span>
  </a>

  <button
    class="nav__toggle"
    [class.is-open]="menuOpen()"
    (click)="toggleMenu()"
    aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>

  <nav class="nav__links" [class.is-open]="menuOpen()">
    @for (link of navLinks; track link.id) {
      <a [routerLink]="['/']" [fragment]="link.id" (click)="closeMenu()">{{ link.label }}</a>
    }
    <a routerLink="/playground" (click)="closeMenu()">Playground</a>
    <a
      class="nav__cta"
      href="mailto:haglerchristopher@gmail.com"
      (click)="closeMenu()">Get in touch</a>
  </nav>
</header>

<router-outlet />

<footer class="footer">
  <div class="container footer__inner">
    <span>© {{ year }} Christopher Hagler</span>
    <span class="footer__built">Built with Angular · deployed on GitHub Pages</span>
  </div>
</footer>
